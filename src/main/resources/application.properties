# Configuración adaptada para PostgreSQL en la nube
#Plan A y plan B tanto en postgre o en forma local conectarlo
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tienda_db}

#Esto es por si nos conectamos en localhost en algun momento
#Nombre de la base de datos
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
#Contraseña por defecto
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# Driver de PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true